spring:
  application:
    name: secure-2fa-auth
  
  # Embedded H2 Database (no external DB needed)
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 Console for database viewing
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  
  # Embedded Redis (using in-memory cache)
  cache:
    type: simple
  
  # Mock email (no real emails sent)
  mail:
    host: localhost
    port: 25
    username: 
    password: 

server:
  port: 8080

# Disable external services for embedded mode
app:
  name: SecureAuth
  
  jwt:
    secret: embedded-jwt-secret-key-for-testing-1234567890123456789012345678901234567890
    expiration: 3600
  
  otp:
    length: 6
    expiration: 300
    max-attempts: 5
    rate-limit-window: 3600
    max-requests-per-hour: 10
  
  totp:
    issuer: SecureAuth-Embedded
    period: 30
    digits: 6
  
  sms:
    enabled: false

logging:
  level:
    com.auth: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,h2-console